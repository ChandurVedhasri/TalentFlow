{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TalentFlow | Edit Profile</title>

    <style>
        * { box-sizing: border-box; font-family: "Segoe UI", Tahoma, sans-serif; }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(120deg, #4f46e5, #06b6d4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 500px;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #111827;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #374151;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }

        textarea { resize: vertical; }

        input:focus, select:focus, textarea:focus {
            border-color: #4f46e5;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        button:hover {
            background: #4338ca;
        }

        .links {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }

        .links a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .error {
            text-align: center;
            color: #dc2626;
            margin-bottom: 12px;
            font-size: 13px;
        }

    </style>
</head>
<body>

<div class="card">
    <h2>Edit Profile</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Role</label>
            <select name="user_type" required>
                <option value="student" {% if profile.user_type == 'student' %}selected{% endif %}>Student</option>
                <option value="recruiter" {% if profile.user_type == 'recruiter' %}selected{% endif %}>Recruiter</option>
            </select>
        </div>

        <div class="form-group">
            <label>Bio</label>
            <textarea name="bio" rows="3">{{ profile.bio }}</textarea>
        </div>

        <div class="form-group">
            <label>Headline</label>
            <input type="text" name="headline" value="{{ profile.headline }}">
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" value="{{ profile.location }}">
        </div>

        <div class="form-group">
            <label>Website</label>
            <input type="url" name="website" value="{{ profile.website }}">
        </div>

        <div class="form-group">
            <label>CGPA</label>
            <input type="number" step="0.01" name="cgpa" value="{{ profile.cgpa }}">
        </div>

        <div class="form-group">
            <label>Skills (comma separated)</label>
            <textarea name="skills" rows="2">{{ profile.skills|join:", " }}</textarea>
        </div>

        <div class="form-group">
            <label>Experience (years)</label>
            <input type="number" step="0.1" name="experience" value="{{ profile.experience }}">
        </div>

        <div class="form-group">
            <label>Certifications (comma separated)</label>
            <textarea name="certifications" rows="2">{{ profile.certifications|join:", " }}</textarea>
        </div>

        <div class="form-group">
            <label>Profile Picture</label>
            <input type="file" name="profile_picture">
        </div>

        <button type="submit">Update Profile</button>
    </form>

    <div class="links">
        <a href="{% url 'dashboard' %}">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
